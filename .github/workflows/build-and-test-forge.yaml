name: "Build & test forge"
on:
  push:
    paths:
      - 'forge/**'
  pull_request:
    branches:
      - master
    paths:
      - 'forge/**'

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo check
      - run: cargo test --all-features
    defaults:
      run:
        working-directory: forge
