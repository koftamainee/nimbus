on:
  push:
    paths:
      - 'quorum/**'
  pull_request:
    branches:
      - master
    paths:
      - 'quorum/**'

jobs:
  test:
    name: 'Build and test quorum'
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: quorum

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: 'true'

      - name: Vet
        run: go vet ./ ...

      - name: Test
        run: go test -count=1 -race ./ ...
