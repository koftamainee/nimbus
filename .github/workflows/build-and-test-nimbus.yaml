name: "Build & test nimbus"
on:
  push:
    paths:
      - 'nimbus/**'
  pull_request:
    branches:
      - master
    paths:
      - 'nimbus/**'

jobs:
  test:
    name: 'Build & test nimbus'
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: nimbus

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 -race ./...
