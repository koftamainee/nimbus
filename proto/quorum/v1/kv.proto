syntax = "proto3";
package quorum.v1;

option go_package = "quorum/gen/quorum/v1;quorumv1";

service KV {
    rpc Put(PutRequest) returns (PutResponse);
    rpc Get(GetRequest) returns (GetResponse);
    rpc Delete(DeleteRequest) returns (DeleteResponse);
    rpc Txn(TxnRequest) returns (TxnResponse);
    rpc Range(RangeRequest) returns (RangeResponse);
}

message PutRequest {
    bytes key = 1;
    bytes value = 2;
}

message PutResponse {
    int64 revision = 1;
}

message GetRequest {
    bytes key = 1;
}

message GetResponse {
    bytes value = 1;
    int64 revision = 2;
    bool found = 3;
}

message DeleteRequest {
    bytes key = 1;
}

message DeleteResponse {
    int64 revision = 1;
}

message TxnRequest {
    repeated Compare compare = 1;
    repeated Operation success = 2;
    repeated Operation failure = 3;
}

message Compare {
    bytes key = 1;
    enum CompareType {
        EQUAL = 0;
        NOT_EQUAL = 1;
        GREATER = 2;
        LESS = 3;
    }
    CompareType type = 2;
    bytes target = 3;
}

message Operation {
    oneof op {
        PutRequest put = 1;
        DeleteRequest delete = 2;
    }
}

message TxnResponse {
    bool succeeded = 1;
    repeated OperationResponse responses = 2;
    int64 revision = 3;
}

message OperationResponse {
    oneof resp {
        PutResponse put = 1;
        DeleteResponse delete = 2;
    }
}

message RangeRequest {
    bytes key = 1;
    bytes range_end = 2;
    int64 limit = 3;
}

message RangeResponse {
    repeated KeyValue kvs = 1;
    bool more = 2;
}

message KeyValue {
    bytes key = 1;
    bytes value = 2;
    int64 revision = 3;
}

message InternalRaftRequest {
    uint64 id = 1;
    oneof cmd {
        PutRequest put = 10;
        DeleteRequest delete = 11;
        TxnRequest txn = 12;
    }
}
